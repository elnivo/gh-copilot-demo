# GitHub Action workflow that runs on push to main branch
# Docker build and push the album-api image to ACR
name: Build and Push Album API Image
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: ./albums-api
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/album-api:latest
          build-args: |
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
            ACR_USERNAME=${{ secrets.ACR_USERNAME }}
            ACR_PASSWORD=${{ secrets.ACR_PASSWORD }}
# tag the image with the GitHub run id and push to docker hub
      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v2
        with:
          context: ./albums-api
          push: true
          tags: yourdockerhubusername/album-api:${{ github.run_id }}
          build-args: |
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
            ACR_USERNAME=${{ secrets.ACR_USERNAME }}
            ACR_PASSWORD=${{ secrets.ACR_PASSWORD }}
# run tests on the album-api image
      - name: Run tests on Docker image
        run: |
          docker run --rm yourdockerhubusername/album-api:${{ github.run_id }} dotnet test /app/tests/AlbumApi.Tests/AlbumApi.Tests.csproj
# deploy the album-api image to the dev AKS cluster
      - name: Deploy to AKS
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: your-aks-cluster-name
          resource-group: your-aks-resource-group
      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/album-api-deployment album-api=yourdockerhubusername/album-api:${{ github.run_id }} --record
          kubectl rollout status deployment/album-api-deployment
# find and replace the %%VERSION%% by the GitHub action run id in every appmanifest.yml file
      - name: Update appmanifest.yml files
        run: |
          find . -name "appmanifest.yml" -exec sed -i "s/%%VERSION%%/${{ github.run_id }}/g" {} \;
